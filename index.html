<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>How do you feel — Shared board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar" aria-label="Share how you feel">
        <div id="config-warning" class="config-warning hidden" role="status"></div>
        <h1 class="sidebar-title">
          <span class="sidebar-title-line">How do you feel</span>
          <span class="sidebar-title-line">right now?</span>
        </h1>
        <label for="feel-input" class="sidebar-label">Your response</label>
        <textarea
          id="feel-input"
          class="sidebar-textarea"
          rows="6"
          maxlength="500"
          placeholder="Write how you’re feeling…"
        ></textarea>
        <div class="sidebar-footer">
          <button type="button" class="btn-post" id="btn-post">POST</button>
        </div>
      </aside>

      <main class="main-panel">
        <p id="board-status" class="board-status board-status-bar"></p>
        <div id="feed" class="feed" aria-live="polite"></div>
      </main>
    </div>

    <div id="post-overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="post-action-title">
      <div class="modal post-modal">
        <h3 id="post-action-title" class="modal-title-pixel">This post</h3>
        <p class="post-modal-copy">Delete it for everyone, or keep it.</p>
        <div class="modal-actions">
          <button type="button" class="btn secondary" id="post-keep">Keep it</button>
          <button type="button" class="btn danger" id="post-delete">Delete</button>
        </div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
